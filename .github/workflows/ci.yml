name: CI

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r starter/requirements.txt pytest-cov

      - name: Lint with flake8
        run: flake8 starter/

      - name: Run tests with coverage
        run: pytest starter/ --cov=starter --cov-report=term-missing